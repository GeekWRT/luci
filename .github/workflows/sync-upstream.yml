name: Sync upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          echo "Fetching upstream..."
          git remote add upstream https://github.com/openwrt/luci.git
          git fetch origin master
          git fetch upstream master

          UPSTREAM_SHA=$(git rev-parse upstream/master)
          FORK_SHA=$(git rev-parse origin/master)

          # Check if already up to date
          if [ "$UPSTREAM_SHA" = "$FORK_SHA" ] || git merge-base --is-ancestor origin/master upstream/master 2>/dev/null; then
            echo "Already up to date with upstream"
            exit 0
          fi

          # Push upstream commits to a temporary ref
          echo "Pushing upstream commits to temp ref..."
          git push origin upstream/master:refs/tmp/sync-upstream 2>&1

          # Use GitHub Merges API to create merge commit on the server
          echo "Creating merge commit via API..."
          MERGE_RESULT=$(gh api repos/${{ github.repository }}/merges \
            --field base="master" \
            --field head="refs/tmp/sync-upstream" \
            --field commit_message="Merge upstream/master into master" 2>&1) || true

          # Clean up temp ref
          gh api -X DELETE repos/${{ github.repository }}/git/refs/tmp/sync-upstream 2>/dev/null || true

          if echo "$MERGE_RESULT" | jq -e '.sha' > /dev/null 2>&1; then
            NEW_SHA=$(echo "$MERGE_RESULT" | jq -r '.sha')
            echo "Synced to: $NEW_SHA"
          elif echo "$MERGE_RESULT" | grep -q "already exists\|Already up to date"; then
            echo "Already up to date"
          elif echo "$MERGE_RESULT" | grep -q "Merge conflict\|conflict"; then
            echo "CONFLICT! Manual resolution needed"
            exit 1
          else
            echo "Result: $MERGE_RESULT"
          fi
